services:
  opcua-client:
    build:
      context: .
    restart: unless-stopped
    environment:
      OPC_CONFIG_FILE: /service/examples/config.docker.yaml
    volumes:
      - ./examples/config.docker.yaml:/service/examples/config.docker.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys
          import urllib.request
          req = urllib.request.Request(
              "http://127.0.0.1:8080/ready",
              headers={"Authorization": "Bearer example-management-token"},
          )
          try:
              with urllib.request.urlopen(req, timeout=3) as response:
                  sys.exit(0 if response.status == 200 else 1)
          except Exception:
              sys.exit(1)
    depends_on:
      mock-opcua-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mock-opcua-server:
    build:
      context: .
    command: ["python", "examples/mock_opcua_server.py"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:4840:4840"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import socket
          socket.create_connection(("127.0.0.1", 4840), timeout=3).close()
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
